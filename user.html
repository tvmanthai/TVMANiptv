<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV MAN IPTV</title>
  <!-- HLS.js for M3U8 playback -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; background: var(--bg-base); }

    /* ===== TOP BAR ===== */
    .topbar {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 50;
    }
    .topbar-logo { display: flex; align-items: center; gap: 8px; }
    .topbar-logo img { width: 28px; height: 28px; border-radius: 6px; background: var(--bg-card); padding: 2px; }
    .topbar-logo span { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--accent); }
    .topbar-info { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .user-meta { text-align: right; }
    .user-meta .name { font-size: 13px; font-weight: 600; }
    .user-meta .expiry { font-size: 11px; color: var(--text-muted); }
    .clock-display { font-size: 12px; color: var(--text-secondary); text-align: right; }

    /* ===== MAIN LAYOUT ===== */
    .tv-layout { display: flex; flex: 1; overflow: hidden; }

    /* ===== CHANNEL SIDEBAR ===== */
    .ch-sidebar {
      width: 280px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .group-bar {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .group-bar::-webkit-scrollbar { height: 3px; }
    .group-chip {
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
      flex-shrink: 0;
    }
    .group-chip:hover { border-color: var(--accent); color: var(--accent); }
    .group-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .ch-search {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ch-search input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      width: 100%;
      color: var(--text-primary);
      font-size: 13px;
    }
    .ch-search input:focus { outline: none; border-color: var(--accent); }

    .ch-list { flex: 1; overflow-y: auto; }
    .ch-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(108,99,255,0.06);
      transition: var(--transition);
      user-select: none;
    }
    .ch-item:hover { background: var(--bg-hover); }
    .ch-item.active { background: rgba(108,99,255,0.15); border-left: 2px solid var(--accent); }
    .ch-logo {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--bg-card); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-size: 18px;
    }
    .ch-logo img { width: 100%; height: 100%; object-fit: contain; }
    .ch-info { min-width: 0; flex: 1; }
    .ch-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ch-group { font-size: 11px; color: var(--text-muted); }

    /* ===== PLAYER AREA ===== */
    .player-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #000;
    }

    .video-wrapper {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #main-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .no-channel {
      text-align: center;
      color: var(--text-muted);
    }
    .no-channel svg { opacity: 0.3; margin-bottom: 12px; }
    .no-channel p { font-family: var(--font-display); font-size: 16px; }

    .loading-ring {
      width: 48px; height: 48px;
      border: 3px solid rgba(108,99,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Controls bar */
    .player-controls {
      background: rgba(7,7,15,0.95);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .ctrl-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .ctrl-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(108,99,255,0.1); }
    .ctrl-btn.active { color: var(--accent-glow); border-color: var(--accent); background: rgba(108,99,255,0.2); }
    .now-playing {
      flex: 1; min-width: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .now-playing-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      max-width: 140px;
    }
    .player-select:focus { outline: none; border-color: var(--accent); }

    /* Volume slider */
    .volume-row { display: flex; align-items: center; gap: 6px; }
    input[type=range] {
      appearance: none;
      width: 80px; height: 4px;
      border-radius: 99px;
      background: var(--bg-hover);
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* ===== SETTINGS MODAL ===== */
    /* uses global modal styles */

    /* ===== Expiry Popup ===== */
    .expiry-popup {
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(239,68,68,0.1));
      border: 1px solid rgba(245,158,11,0.4);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .expiry-popup .icon { font-size: 28px; flex-shrink: 0; }
    .expiry-popup p { font-size: 14px; line-height: 1.7; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .ch-sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
        width: 280px;
      }
      .ch-sidebar.open { transform: translateX(0); box-shadow: 4px 0 32px rgba(0,0,0,0.6); }
      .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; display: none; }
      .sidebar-overlay.show { display: block; }
    }
    @media (min-width: 769px) {
      .ch-toggle-btn { display: none !important; }
    }
  </style>
</head>
<body>
  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Top Bar -->
  <div class="topbar">
    <button class="ctrl-btn ch-toggle-btn" style="display:flex" onclick="toggleSidebar()" title="เปิด/ปิดรายการช่อง">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="topbar-logo">
      <img src="https://img1.pic.in.th/images/TVMAN.png" alt="TV MAN" onerror="this.style.display='none'">
      <span>TV MAN IPTV</span>
    </div>
    <div class="topbar-info">
      <div class="user-meta">
        <div class="name" id="ui-user-name">—</div>
        <div class="expiry" id="ui-expiry">—</div>
      </div>
      <div class="clock-display" id="ui-clock"></div>
      <button class="ctrl-btn" onclick="openSettings()" title="ตั้งค่า">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="doLogout()" title="ออกจากระบบ">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </div>

  <!-- TV Layout -->
  <div class="tv-layout">
    <!-- Channel Sidebar -->
    <div class="ch-sidebar" id="ch-sidebar">
      <div class="group-bar" id="group-bar">
        <button class="group-chip active" data-group="ALL" onclick="filterGroup('ALL',this)">ทั้งหมด</button>
      </div>
      <div class="ch-search">
        <input id="ch-search-input" type="search" placeholder="🔍 ค้นหาช่อง..." oninput="searchChannels(this.value)">
      </div>
      <div class="ch-list" id="ch-list">
        <div style="padding:32px;text-align:center;color:var(--text-muted)">
          <div style="font-size:32px;margin-bottom:8px">📺</div>
          <p style="font-size:13px">ยังไม่มีรายการช่อง<br>กรุณาติดต่อแอดมิน</p>
        </div>
      </div>
    </div>

    <!-- Player -->
    <div class="player-area">
      <div class="video-wrapper" id="video-wrapper">
        <video id="main-video" playsinline></video>
        <div class="video-overlay" id="video-overlay">
          <div class="no-channel" id="no-channel-msg">
            <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2l-5 5-5-5"/></svg>
            <p>เลือกช่องจากรายการด้านซ้าย</p>
          </div>
          <div class="loading-ring hidden" id="loading-ring"></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="player-controls">
        <button class="ctrl-btn" id="btn-play" onclick="togglePlay()" title="เล่น/หยุด">
          <svg id="play-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-mute" onclick="toggleMute()" title="เปิด/ปิดเสียง">
          <svg id="mute-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
        </button>
        <div class="volume-row">
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
        </div>
        <div class="now-playing">
          <span class="live-dot" id="live-dot" style="display:none"></span>
          <span class="now-playing-name" id="now-playing-name">ไม่มีช่องที่เล่นอยู่</span>
        </div>
        <select class="player-select" id="audio-track-select" onchange="switchAudio(this.value)" title="เลือกเสียง">
          <option value="">🔊 เสียง</option>
        </select>
        <button class="ctrl-btn" id="btn-sub" onclick="toggleSubtitles()" title="คำบรรยาย">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M7 12h4M15 12h2M7 16h2M13 16h4"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-fullscreen" onclick="toggleFullscreen()" title="เต็มจอ">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Expiry Popup Modal -->
  <div id="modal-expiry" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">⚠️ แจ้งเตือนการใช้งาน</span>
      </div>
      <div class="modal-body">
        <div class="expiry-popup">
          <div class="icon">⏰</div>
          <p id="expiry-msg"></p>
        </div>
        <button class="btn btn-primary btn-block" onclick="closeExpiryModal()">รับทราบ</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">⚙️ ตั้งค่า Player</span>
        <button class="modal-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="form-group">
            <label class="form-label">เลือก Player</label>
            <select id="player-pref" class="form-select" onchange="savePlayerPref(this.value)">
              <option value="builtin">▶ Player ในระบบ (แนะนำ)</option>
              <option value="external">📱 Player แอพฯ ภายนอก (.m3u8)</option>
            </select>
            <p style="font-size:12px;color:var(--text-muted);margin-top:6px">Player ภายนอกจะเปิด URL ในแอพที่ติดตั้งบนเครื่อง (ต้องรองรับ .m3u8)</p>
          </div>
          <hr style="border:none;border-top:1px solid var(--border)">
          <div class="form-group">
            <label class="form-label">ข้อมูลผู้ใช้</label>
            <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-size:13px">
              <div style="margin-bottom:4px">👤 <strong id="s-username"></strong></div>
              <div style="color:var(--text-muted)">📅 หมดอายุ: <span id="s-expiry"></span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/db.js"></script>
  <script>
    TVMAN_DB.init();
    const user = Auth.currentUser();
    if (!user || user.role === 'admin') { location.href = user ? 'admin.html' : 'index.html'; }

    // ---- User info ----
    document.getElementById('ui-user-name').textContent = user.displayName;
    document.getElementById('ui-expiry').textContent = user.expiryDate ? `หมดอายุ: ${formatDateTH(user.expiryDate)}` : '';

    // Clock
    function updateClock() {
      document.getElementById('ui-clock').textContent = new Date().toLocaleString('th-TH');
    }
    updateClock(); setInterval(updateClock, 1000);

    function formatDateTH(d) {
      return new Date(d).toLocaleDateString('th-TH', {year:'numeric',month:'long',day:'numeric'});
    }

    // ---- Expiry warning (once per day) ----
    function checkExpiryWarning() {
      if (!user.expiryDate) return;
      const today = new Date(); today.setHours(0,0,0,0);
      const expiry = new Date(user.expiryDate); expiry.setHours(0,0,0,0);
      const daysLeft = Math.ceil((expiry - today) / 86400000);
      if (daysLeft > 3) return;

      const todayStr = new Date().toISOString().slice(0,10);
      const lastLogin = TVMAN_DB.getLastLoginDate(user.id);
      if (lastLogin === todayStr) return;

      TVMAN_DB.setLastLoginDate(user.id, todayStr);
      document.getElementById('expiry-msg').innerHTML =
        `วันใช้งานของคุณ <strong>${user.displayName}</strong> เหลือแค่ <strong style="color:var(--warning)">${daysLeft} วัน</strong><br>กรุณาติดต่อแอดมิน เพื่อต่ออายุการใช้งาน`;
      document.getElementById('modal-expiry').classList.remove('hidden');
    }
    setTimeout(checkExpiryWarning, 800);

    function closeExpiryModal() { document.getElementById('modal-expiry').classList.add('hidden'); }

    // ---- Settings ----
    function openSettings() {
      document.getElementById('s-username').textContent = user.displayName + ' (@' + user.username + ')';
      document.getElementById('s-expiry').textContent = user.expiryDate ? formatDateTH(user.expiryDate) : 'ไม่กำหนด';
      document.getElementById('player-pref').value = localStorage.getItem('tvman_player_pref') || 'builtin';
      document.getElementById('modal-settings').classList.remove('hidden');
    }
    function closeSettings() { document.getElementById('modal-settings').classList.add('hidden'); }
    function savePlayerPref(v) { localStorage.setItem('tvman_player_pref', v); showToast('บันทึกการตั้งค่าแล้ว','success'); }

    // ---- Load channels ----
    let allChannels = [];
    let filteredChannels = [];
    let currentGroup = 'ALL';
    let currentChannel = null;

    function loadChannels() {
      const pls = TVMAN_DB.getPlaylists();
      allChannels = [];
      pls.forEach(pl => {
        if (pl.content) {
          allChannels.push(...M3UParser.parse(pl.content));
        } else if (pl.url) {
          // URL-based: store as single entry for fetch
          allChannels.push({ name: pl.name, group: 'Live', logo: '', url: pl.url });
        }
      });
      buildGroupBar();
      renderChannels(allChannels);
    }

    function buildGroupBar() {
      const groups = ['ALL', ...new Set(allChannels.map(c => c.group))];
      const bar = document.getElementById('group-bar');
      bar.innerHTML = groups.map(g => `
        <button class="group-chip${g===currentGroup?' active':''}" data-group="${g}" onclick="filterGroup('${g}',this)">${g==='ALL'?'ทั้งหมด':g}</button>
      `).join('');
    }

    function filterGroup(group, btn) {
      currentGroup = group;
      document.querySelectorAll('.group-chip').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const q = document.getElementById('ch-search-input').value;
      applyFilter(q);
    }

    function searchChannels(q) {
      applyFilter(q);
    }

    function applyFilter(q) {
      filteredChannels = allChannels.filter(c => {
        const groupOk = currentGroup === 'ALL' || c.group === currentGroup;
        const searchOk = !q || c.name.toLowerCase().includes(q.toLowerCase());
        return groupOk && searchOk;
      });
      renderChannels(filteredChannels);
    }

    function renderChannels(channels) {
      const list = document.getElementById('ch-list');
      if (channels.length === 0) {
        list.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);font-size:13px">ไม่พบช่องที่ค้นหา</div>';
        return;
      }
      list.innerHTML = channels.map((c, i) => {
        const isActive = currentChannel && currentChannel.url === c.url;
        return `
          <div class="ch-item${isActive?' active':''}" onclick="playChannel(${allChannels.indexOf(c)})" tabindex="0">
            <div class="ch-logo">
              ${c.logo ? `<img src="${c.logo}" alt="" onerror="this.parentElement.textContent='📺'">` : '📺'}
            </div>
            <div class="ch-info">
              <div class="ch-name">${c.name}</div>
              <div class="ch-group">${c.group}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ---- Player ----
    const video = document.getElementById('main-video');
    let hls = null;
    let isPlaying = false;
    let isMuted = false;

    function playChannel(idx) {
      const ch = allChannels[idx];
      if (!ch) return;
      currentChannel = ch;

      const pref = localStorage.getItem('tvman_player_pref') || 'builtin';
      if (pref === 'external') {
        window.open(ch.url, '_blank');
        return;
      }

      // Update UI
      document.getElementById('no-channel-msg').classList.add('hidden');
      document.getElementById('loading-ring').classList.remove('hidden');
      document.getElementById('now-playing-name').textContent = ch.name;
      document.getElementById('live-dot').style.display = 'inline-block';
      renderChannels(filteredChannels.length > 0 ? filteredChannels : allChannels);

      // Destroy existing
      if (hls) { hls.destroy(); hls = null; }
      video.src = '';

      if (Hls.isSupported()) {
        hls = new Hls({ enableWorker: false, lowLatencyMode: true });
        hls.loadSource(ch.url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          hideLoading();
          video.play().catch(() => {});
          updateAudioTracks();
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (data.fatal) {
            hideLoading();
            document.getElementById('no-channel-msg').innerHTML = '<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:.3;margin-bottom:8px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><p>ไม่สามารถเล่นช่องนี้ได้</p>';
            document.getElementById('no-channel-msg').classList.remove('hidden');
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = ch.url;
        video.addEventListener('loadedmetadata', () => { hideLoading(); video.play().catch(()=>{}); });
      } else {
        hideLoading();
        showToast('เบราว์เซอร์ไม่รองรับ HLS Stream','error');
      }

      closeSidebar();
    }

    function hideLoading() {
      document.getElementById('loading-ring').classList.add('hidden');
    }

    function updateAudioTracks() {
      if (!hls) return;
      const sel = document.getElementById('audio-track-select');
      sel.innerHTML = '<option value="">🔊 เสียง</option>';
      if (hls.audioTracks && hls.audioTracks.length > 1) {
        hls.audioTracks.forEach((t, i) => {
          sel.innerHTML += `<option value="${i}">${t.name || 'Track '+(i+1)}</option>`;
        });
      }
    }

    function switchAudio(idx) {
      if (hls && idx !== '') hls.audioTrack = parseInt(idx);
    }

    function togglePlay() {
      if (!currentChannel) return;
      if (video.paused) { video.play(); setPlayIcon(true); }
      else { video.pause(); setPlayIcon(false); }
    }
    function setPlayIcon(playing) {
      document.getElementById('play-icon').innerHTML = playing
        ? '<path d="M6 19h4V5H6v14zM14 19h4V5h-4v14z"/>'
        : '<path d="M5 3l14 9-14 9z"/>';
    }
    video.addEventListener('play', () => setPlayIcon(true));
    video.addEventListener('pause', () => setPlayIcon(false));

    function toggleMute() {
      isMuted = !isMuted;
      video.muted = isMuted;
      document.getElementById('mute-icon').innerHTML = isMuted
        ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
        : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>';
    }
    function setVolume(v) { video.volume = parseFloat(v); if (parseFloat(v) > 0) { isMuted = false; video.muted = false; } }

    function toggleSubtitles() {
      if (!video.textTracks.length) { showToast('ไม่มีคำบรรยายสำหรับช่องนี้'); return; }
      const track = video.textTracks[0];
      const show = track.mode !== 'showing';
      track.mode = show ? 'showing' : 'disabled';
      document.getElementById('btn-sub').classList.toggle('active', show);
    }

    function toggleFullscreen() {
      const el = document.getElementById('video-wrapper');
      if (!document.fullscreenElement) el.requestFullscreen?.();
      else document.exitFullscreen?.();
    }

    // ---- Sidebar toggle (mobile) ----
    function toggleSidebar() {
      document.getElementById('ch-sidebar').classList.toggle('open');
      document.getElementById('sidebar-overlay').classList.toggle('show');
    }
    function closeSidebar() {
      document.getElementById('ch-sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('show');
    }

    // ---- Remote / keyboard support ----
    document.addEventListener('keydown', e => {
      const items = document.querySelectorAll('.ch-item');
      const activeIdx = [...items].findIndex(i => i.classList.contains('active'));
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const next = items[activeIdx + 1] || items[0];
        if (next) next.click();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = items[activeIdx - 1] || items[items.length-1];
        if (prev) prev.click();
      } else if (e.key === ' ' || e.key === 'Enter') {
        if (document.activeElement.classList.contains('ch-item')) return;
        e.preventDefault(); togglePlay();
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFullscreen();
      } else if (e.key === 'm' || e.key === 'M') {
        toggleMute();
      }
    });

    // Toast
    function showToast(msg, type='info') {
      const icons = {success:'✅',error:'❌',warn:'⚠️',info:'ℹ️'};
      const el = document.createElement('div');
      el.className = `toast toast-${type==='error'?'error':type==='success'?'success':'warn'}`;
      el.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function doLogout() { Auth.logout(); location.href = 'index.html'; }

    // Load channels on page load
    loadChannels();
  </script>
</body>
</html>
